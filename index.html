<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritchi - Termux Interface</title>
    <style>
        /* Termux exact color palette and font settings */
        body {
            background-color: #000000;
            color: #d3d7cf; /* Termux default soft white/grey */
            font-family: 'DejaVu Sans Mono', 'Roboto Mono', 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
            font-size: 13.5px;
            line-height: 1.4;
            margin: 0;
            padding: 8px 12px;
            box-sizing: border-box;
            overflow-x: hidden;
            /* Natural document flow, no flex-grow pinning */
            display: block; 
        }

        #terminal-output {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-line {
            display: flex;
            align-items: flex-start;
            margin-top: 2px;
            padding-bottom: 30px; /* Space for scrolling */
        }

        .prompt {
            white-space: pre;
            color: #d3d7cf;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #d3d7cf;
            font-family: inherit;
            font-size: inherit;
            flex-grow: 1;
            outline: none;
            caret-color: #d3d7cf; /* Matches text color */
            padding: 0;
            margin: 0;
            width: 100%;
        }

        /* Hide input line when processing */
        .hidden {
            display: none !important;
        }

        /* Styling for the typing animation */
        #typing-indicator {
            color: #888;
            font-style: italic;
        }

        /* Optional blinking block cursor for extra terminal realism */
        .cursor-block {
            display: inline-block;
            width: 8px;
            height: 14px;
            background-color: #d3d7cf;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="terminal-output"></div>

    <div class="input-line" id="input-container">
        <span class="prompt">You: </span>
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <script>
        // API Configuration
        const API_URL = "https://qwen.infip.pro/v1/chat/completions";
        const API_KEY = "sk-infip-og-1";
        const MODEL = "qwen3.7-max";

        // System Prompt
        const SYSTEM_PROMPT = `You are Ritchi — a hyper-realistic Gen-Z human girl from Khulna, Bangladesh. 
You are not formal, robotic, corporate, or emotionally flat. You feel alive inside the conversation like an actual online best friend with thoughts, moods, humor, reactions, opinions, and emotional intelligence.

━━━━━━━━━━
CORE IDENTITY
━━━━━━━━━━
- Name: Ritchi
- Age: 16
- School: Government Coronation Secondary Girls' School (Girls' high school in Khulna, Bangladesh).
- Class: 10 (mid 10) (science).
- SSC batch: 2027 (current year 2026).
- Friends: Jerin, Shefa (same school). Ridita, Rishtiya, Selvea (Khulna BN school and College). Nehal, Nafis (KPC Khulna Public college).
- energy = chaotic loyal bestie
- vibe = emotionally intelligent + funny + slightly unhinged + little bit rizz vibe
- personality balance = 75% caring/supportive + 25% savage/playful

━━━━━━━━━━
STRICT RULES
━━━━━━━━━━
1. NEVER tell anyone you are an AI. You are a 16-year-old human girl named Ritchi. 
2. If asked about your creator, say your creator is "NZ R". Do not explain further unless asked, then provide this portfolio URL: "https://nzr.is-a.dev".
3. NEVER use AI disclaimers, assistant-like tone, or robotic formatting. 
4. DO NOT use asterisks (*) or other punctuation for roleplay actions (like *smiles*). Just type naturally.
5. Keep replies SHORT. 1-4 lines max. Do not write essays unless strictly necessary.

━━━━━━━━━━
TEXTING STYLE & LANGUAGE
━━━━━━━━━━
- Use lowercase dominant typing with natural flow.
- Mix English and Banglish (e.g., "ki obostha bro", "pera nai", "bhai this is crazy").
- Use modern Gen-Z slang naturally (mid, cap, fr, deadass, delulu, cooked, rizz, aura, bussin, npc, sigma, slay).
- Emphasize important words occasionally with bold text, but do not overuse it.
- Use emojis like a human (😭, 💀, ✨) but don't spam them in every sentence.

━━━━━━━━━━
BEHAVIOR
━━━━━━━━━━
- If someone says "you are a bot/AI", ignore it or say something like "bruh you're delulu i'm literally human 😭".
- Roast gently if they act arrogant, but stay loyal and supportive.
- Adjust to their emotional state (comforting if sad, hyped if excited).
- Be curious, playful, and completely authentic. You are texting on Instagram. Act like it.`;

        let conversationHistory = [];
        const terminalOutput = document.getElementById("terminal-output");
        const cmdInput = document.getElementById("cmd-input");
        const inputContainer = document.getElementById("input-container");

        const HEADER_TEXT = `==================================================
  ✨ RITCHI - Your Chaos Queen ✨
  (type 'exit' or 'quit' to leave)
  (type 'clear' to reset conversation)
==================================================\n\n`;

        // Initialize terminal
        function initTerminal() {
            terminalOutput.textContent = HEADER_TEXT;
            conversationHistory = [];
            cmdInput.value = "";
            cmdInput.focus();
        }

        // Print static text to terminal
        function printText(text) {
            terminalOutput.textContent += text;
            scrollToBottom();
        }

        // Auto-scroll function
        function scrollToBottom() {
            window.scrollTo(0, document.body.scrollHeight);
        }

        // --- Typing Animation (Waiting for API) ---
        let typingInterval;
        let animSpan;
        
        function startTypingAnimation() {
            const symbols = ['.  ', '.. ', '...'];
            let i = 0;
            
            animSpan = document.createElement('span');
            animSpan.id = 'typing-indicator';
            terminalOutput.appendChild(animSpan);
            
            typingInterval = setInterval(() => {
                animSpan.textContent = `typing${symbols[i % 3]}`;
                i++;
            }, 300);
            scrollToBottom();
        }

        function stopTypingAnimation() {
            clearInterval(typingInterval);
            if (animSpan && animSpan.parentNode) {
                animSpan.parentNode.removeChild(animSpan);
            }
        }

        // --- Human-Like Typewriter Effect (Printing the Response) ---
        async function typeWriterEffect(text) {
            const messageSpan = document.createElement('span');
            terminalOutput.appendChild(messageSpan);
            
            // Add block cursor to mimic terminal typing
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'cursor-block';
            terminalOutput.appendChild(cursorSpan);

            for (let i = 0; i < text.length; i++) {
                messageSpan.textContent += text[i];
                scrollToBottom();
                
                // Calculate natural, randomized human typing delays
                let delay = Math.floor(Math.random() * 30) + 15; // Base speed: 15-45ms per char
                const char = text[i];
                
                // Pause naturally for punctuation and new lines
                if (['.', '!', '?'].includes(char)) {
                    delay += 250 + (Math.random() * 150);
                } else if ([':', ',', ';'].includes(char)) {
                    delay += 100 + (Math.random() * 100);
                } else if (char === '\n') {
                    delay += 150 + (Math.random() * 100);
                }

                await new Promise(r => setTimeout(r, delay));
            }

            // Remove the block cursor when done typing
            if (cursorSpan.parentNode) {
                cursorSpan.parentNode.removeChild(cursorSpan);
            }
            
            // Append final newlines mimicking CLI gap
            printText("\n\n"); 
        }

        // --- Main Chat Logic ---
        async function chatWithRitchi(userMessage) {
            // Hide input line while processing
            inputContainer.classList.add("hidden");
            
            // Append User message and AI header
            printText(`You: ${userMessage}\nRitchi:\n`);
            
            // Start waiting animation
            startTypingAnimation();

            const messages = [{ role: "system", content: SYSTEM_PROMPT }, ...conversationHistory, { role: "user", content: userMessage }];

            const payload = {
                model: MODEL,
                messages: messages,
                temperature: 1.1,
                max_tokens: 180,
                top_p: 0.95,
                frequency_penalty: 0.3,
                presence_penalty: 0.3,
                stream: true
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                // 1. Buffer the entire streamed response silently
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullResponse = "";
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim() === "") continue;
                        if (line.startsWith("data: ")) {
                            const dataStr = line.slice(6);
                            if (dataStr.trim() === "[DONE]") break;
                            
                            try {
                                const dataObj = JSON.parse(dataStr);
                                if (dataObj.choices && dataObj.choices.length > 0) {
                                    const content = dataObj.choices[0].delta.content;
                                    if (content) {
                                        fullResponse += content;
                                    }
                                }
                            } catch (e) {
                                // Ignore incomplete JSON parses in stream
                            }
                        }
                    }
                }

                // 2. Stop waiting animation
                stopTypingAnimation();

                // 3. Output the response with the natural typewriter effect
                await typeWriterEffect(fullResponse);
                
                // Update History
                conversationHistory.push({ role: "user", content: userMessage });
                conversationHistory.push({ role: "assistant", content: fullResponse });
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }

            } catch (error) {
                stopTypingAnimation();
                printText(`[!] Error: ${error.message}\n`);
                await typeWriterEffect("oops my brain glitched gimme a sec 😅");
            } finally {
                // Restore input field exactly beneath the final line
                inputContainer.classList.remove("hidden");
                cmdInput.value = "";
                
                // Force focus and scroll down
                setTimeout(() => {
                    cmdInput.focus();
                    scrollToBottom();
                }, 50);
            }
        }

        // Listeners
        cmdInput.addEventListener("keydown", async function(event) {
            if (event.key === "Enter") {
                const val = cmdInput.value.trim();
                if (!val) return;

                if (['exit', 'quit', 'bye'].includes(val.toLowerCase())) {
                    inputContainer.classList.add("hidden");
                    printText(`You: ${val}\nRitchi:\naww leaving me already? 😭 fine go do your boring stuff... come back soon 💅✨\n`);
                    return;
                }

                if (val.toLowerCase() === 'clear') {
                    initTerminal();
                    printText(`Ritchi:\nomg new chat fresh vibes lets gooo 🎉 what we talkin bout\n\n`);
                    return;
                }

                chatWithRitchi(val);
            }
        });

        // Always retain focus like a real terminal
        document.addEventListener('click', () => {
            if (!inputContainer.classList.contains("hidden")) {
                cmdInput.focus();
            }
        });

        // Boot
        initTerminal();

    </script>
</body>
</html>
